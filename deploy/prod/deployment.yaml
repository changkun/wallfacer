apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallfacerd
  namespace: latere
  labels:
    app: wallfacerd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallfacerd
  template:
    metadata:
      labels:
        app: wallfacerd
    spec:
      containers:
        - name: wallfacerd
          image: ghcr.io/changkun/wallfacerd:main
          imagePullPolicy: Always
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc:4318
            - name: AUTH_URL
              value: https://auth.latere.ai
            - name: AUTH_REDIRECT_URL
              value: https://wf.latere.ai/callback
            # wf.latere.ai signs in through the public, bootstrap-managed
            # `wallfacer` OAuth client (PKCE, no client secret) — the same
            # client the local `wallfacer run` uses. A public browser client
            # has no secret to derive a cookie key from, so AUTH_COOKIE_KEY is
            # required and lives in its own minimal secret.
            - name: AUTH_CLIENT_ID
              value: wallfacer
            - name: AUTH_COOKIE_KEY
              valueFrom:
                secretKeyRef:
                  name: wallfacerd-cookie
                  key: AUTH_COOKIE_KEY
            # Cloud coordination plane (presence, remote control, metadata
            # projection, spec comments). REDIS is the shared latere-valkey for
            # cross-replica ephemeral state; DATABASE_URL is the wallfacer
            # Postgres for authoritative comments + projection rollups. Both are
            # inert until the coordinator ships. Bumping `replicas` past 1 is
            # gated on that code landing and on verifying the login/SSE paths are
            # multi-replica-safe.
            - name: WALLFACER_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: wallfacerd-redis
                  key: WALLFACER_REDIS_URL
            - name: WALLFACER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wallfacer-db
                  key: WALLFACER_DATABASE_URL
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

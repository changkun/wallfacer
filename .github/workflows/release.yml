name: Release

# Tag-triggered release via the central reusable pipeline (latere-ai/ci).
# wallfacer is dual-shape: a CLI and the wallfacerd service. The service image
# (Dockerfile.wallfacerd) is built in dockerfile mode, deployed to the shared
# `latere` namespace, and smoked live; the CLI binaries are built by
# tools/release/build-cli.sh and attached to the GitHub release. The release
# publishes only after the live smoke passes.
#
# Registry stays ghcr.io/changkun/wallfacerd for now; the move to
# ghcr.io/latere-ai is a separate, watched change (touches live pods +
# terraform/ghcr_cleanup.py).
#
# Pinned at @main until dockerfile + build_cli are validated and folded into @v1.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  release:
    uses: latere-ai/ci/.github/workflows/service-release.yml@main
    with:
      service: wallfacerd
      image: ghcr.io/changkun/wallfacerd
      namespace: latere
      url: https://wf.latere.ai
      title: Wallfacer
      build_mode: dockerfile
      dockerfile: Dockerfile.wallfacerd
      has_frontend: false
      build_cli: true
      cli_build_cmd: tools/release/build-cli.sh
    secrets: inherit

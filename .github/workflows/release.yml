name: Release

# Tag-triggered release via the central reusable pipeline (latere-ai/ci),
# matching every other latere service. Pushing a version tag (v*) builds the
# wallfacerd image (Dockerfile.wallfacerd, which also compiles the frontend),
# deploys the kustomize deploy/prod/ overlay to the shared `latere` namespace,
# smokes the live surface, builds the CLI binaries (tools/build-cli.sh — the
# platform matrix + SANDBOX_TAG + version ldflags live there), and publishes the
# GitHub release with the binaries attached and the smoke evidence.
#
# Image stays at ghcr.io/changkun/wallfacerd; release notes are now
# auto-generated (the previous docs/releases/<tag>.md convention is dropped).

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  release:
    uses: latere-ai/ci/.github/workflows/service-release.yml@v1
    with:
      service: wallfacerd
      image: ghcr.io/changkun/wallfacerd
      namespace: latere
      url: https://wf.latere.ai
      title: Wallfacer
      build_mode: dockerfile
      dockerfile: Dockerfile.wallfacerd
      has_frontend: false
      build_cli: true
      cli_build_cmd: bash tools/build-cli.sh
      smoke_script: tools/smoke/release.sh
    secrets: inherit

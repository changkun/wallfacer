name: Release Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binary:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --no-audit --no-fund
        working-directory: ui

      - name: Compile TypeScript sources
        run: node scripts/build-ts.mjs
        working-directory: ui

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -trimpath -ldflags "-s -w -X changkun.de/x/wallfacer/internal/cli.Version=${VERSION}" \
            -o wallfacer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wallfacer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

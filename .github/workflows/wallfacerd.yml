name: wallfacerd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: ./.github/actions/bun-install
      - run: cd frontend && bunx --bun vue-tsc --noEmit
      - run: cd frontend && bunx --bun vite-ssg build
      - uses: actions/upload-artifact@v7
        if: success()
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  verify-go:
    needs: [verify-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/
      - run: go build -o /dev/null .
      - run: go vet ./internal/webserver/...

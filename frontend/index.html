<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/instrument-serif-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/instrument-serif-italic.woff2" as="font" type="font/woff2" crossorigin />
    <title>Wallfacer</title>
    <link rel="icon" type="image/png" href="/static/wallfacer-icon.png" />
    <link rel="apple-touch-icon" href="/static/wallfacer-icon.png" />
    <script>
      (function() {
        // Unified storage key with the legacy ui/ — both surfaces honour
        // the same preference so cross-tab paints don't disagree.
        var t = localStorage.getItem('wallfacer-theme') || 'auto';
        if (t === 'auto') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

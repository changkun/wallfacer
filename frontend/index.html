<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="/fonts/lato-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/lato-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/space-grotesk-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono-var.woff2" as="font" type="font/woff2" crossorigin />
    <title>Wallfacer</title>
    <link rel="icon" type="image/png" href="/static/wallfacer-icon.png" />
    <link rel="apple-touch-icon" href="/static/wallfacer-icon.png" />
    <script>
      (function() {
        // Unified storage key with the legacy ui/ — both surfaces honour
        // the same preference so cross-tab paints don't disagree.
        var t = localStorage.getItem('wallfacer-theme') || 'auto';
        if (t === 'auto') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
        // Color palette axis (see stores/prefs.ts); default clay carries no
        // attribute. Keep the list in sync with PALETTES.
        var p = localStorage.getItem('wallfacer-palette');
        if (p === 'indigo' || p === 'amber' || p === 'rose' || p === 'copper') {
          document.documentElement.setAttribute('data-palette', p);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<div
  id="flows-mode-container"
  class="flows-mode-container"
  style="display: none"
>
  <div class="flows-mode__inner">
    <header class="flows-mode__header">
      <div class="flows-mode__header-row">
        <div>
          <h2 class="flows-mode__title">Flows</h2>
          <p class="flows-mode__subtitle">
            A flow is an ordered chain of sub-agents a task runs against.
            Built-in rows are read-only. Click <strong>Clone</strong> to
            copy one into a user-authored flow you can edit, or
            <strong>New Flow</strong> to start from scratch.
            <code>?</code> marks optional steps; <code>‖</code> marks
            steps that run in parallel.
          </p>
        </div>
        <button
          type="button"
          class="flows-mode__new"
          onclick="window.__flows_test && window.__flows_test.openNewEditor && window.__flows_test.openNewEditor()"
        >
          + New Flow
        </button>
      </div>
    </header>
    <div id="flows-list" class="flows-mode__list" aria-busy="true">
      <p class="flows-mode__empty">Loading flows…</p>
    </div>
  </div>
</div>

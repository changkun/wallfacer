<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallfacer — Task Board</title>
    <script>
      if (window.wails || window.WailsInvoke)
        document.documentElement.classList.add("wails-desktop");
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧱</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/tailwind.css" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/vendor/xterm.css" />
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
      mermaid.initialize({ startOnLoad: false, theme: "neutral" });
      window.mermaid = mermaid;
    </script>
    {{if .ServerAPIKey}}
    <meta name="wallfacer-token" content="{{.ServerAPIKey}}" />
    {{end}}
    <script src="/js/vendor/sortable.min.js"></script>
    <script src="/js/vendor/marked.min.js"></script>
    <script src="/js/vendor/highlight.min.js"></script>
    <script src="/js/vendor/xterm.min.js"></script>
    <script src="/js/vendor/xterm-addon-fit.min.js"></script>
  </head>
  <body class="h-screen overflow-hidden flex">
    <div
      id="board-announcer"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      style="
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      "
    ></div>

    <!-- Theme init (before render to prevent flash) -->
    <script>
      (function () {
        var mode = localStorage.getItem("wallfacer-theme") || "auto";
        var dark =
          mode === "dark" ||
          (mode === "auto" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute(
          "data-theme",
          dark ? "dark" : "light",
        );
      })();
    </script>

    {{template "sidebar.html"}}
  </body>
</html>

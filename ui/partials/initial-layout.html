<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallfacer — Task Board</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧱</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tailwind.css">
<link rel="stylesheet" href="/css/styles.css">
{{if .ServerAPIKey}}<meta name="wallfacer-token" content="{{.ServerAPIKey}}">{{end}}
<script src="/js/vendor/sortable.min.js"></script>
<script src="/js/vendor/marked.min.js"></script>
<script src="/js/vendor/highlight.min.js"></script>
</head>
<body class="h-screen overflow-hidden flex flex-col">
<div id="board-announcer" role="status" aria-live="polite" aria-atomic="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;"></div>

<!-- Theme init (before render to prevent flash) -->
<script>
(function() {
  var mode = localStorage.getItem('wallfacer-theme') || 'auto';
  var dark = mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
})();
</script>

<!-- Header -->
<header class="app-header">
  <div class="app-header__primary">
    <div class="app-header__identity">
      <div class="app-header__brand">
        <h1 style="font-size: 22px; font-weight: 400; letter-spacing: 0.01em; margin: 0; display: flex; align-items: center; gap: 7px;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block; image-rendering: pixelated;"><rect x="0" y="0" width="6" height="3" rx="0" fill="#d97757"/><rect x="7" y="0" width="9" height="3" rx="0" fill="#c4623f"/><rect x="0" y="4" width="4" height="3" rx="0" fill="#a84e2e"/><rect x="5" y="4" width="6" height="3" rx="0" fill="#d97757"/><rect x="12" y="4" width="4" height="3" rx="0" fill="#c4623f"/><rect x="0" y="8" width="7" height="3" rx="0" fill="#c4623f"/><rect x="8" y="8" width="8" height="3" rx="0" fill="#a84e2e"/><rect x="0" y="12" width="3" height="4" rx="0" fill="#d97757"/><rect x="4" y="12" width="6" height="4" rx="0" fill="#a84e2e"/><rect x="11" y="12" width="5" height="4" rx="0" fill="#d97757"/></svg><a href="https://github.com/changkun/wallfacer" target="_blank" rel="noopener noreferrer" style="font-family: 'Instrument Serif', Georgia, serif; font-style: italic; background: linear-gradient(135deg, #d97757 0%, #c4623f 60%, #a84e2e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none;">Wallfacer</a></h1>
      </div>
    </div>
    <div id="workspace-group-tabs" class="workspace-group-tabs"></div>
    <div class="app-header__actions">
      <div class="task-search-wrapper app-header__search">
        <span class="task-search-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input type="search" id="task-search" placeholder="Filter tasks… or @search server" autocomplete="off" class="task-search-input">
        <button id="task-search-clear" class="task-search-clear" title="Clear search">&times;</button>
      </div>

      <div class="app-header__button-row">
        <div class="automation-menu-wrap">
          <button id="automation-menu-btn" type="button" class="settings-btn" onclick="toggleAutomationMenu(event)" title="Automation controls">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            <span id="automation-active-count" class="automation-active-count" style="display:none;"></span>
          </button>
          <div id="automation-menu" class="hidden automation-menu">
            <div class="automation-menu__header">Automation</div>
            <div class="header-toggle-strip" role="group" aria-label="Automation controls">
              <label class="header-toggle-chip" for="ideation-header-toggle">
                <span class="header-toggle-chip__meta">
                  <span class="header-toggle-chip__label">Ideate</span>
                  <span class="hint-trigger header-toggle-chip__hint">?<span class="hint-tooltip">When enabled, the brainstorm agent automatically generates new task ideas on a recurring schedule.</span></span>
                </span>
                <span class="header-toggle-chip__switch">
                  <input type="checkbox" id="ideation-header-toggle" onchange="toggleIdeationHeader()">
                  <span class="header-toggle-chip__track" aria-hidden="true"></span>
                </span>
              </label>

              <label class="header-toggle-chip" for="autorefine-toggle">
                <span class="header-toggle-chip__meta">
                  <span class="header-toggle-chip__label">Refine</span>
                  <span class="hint-trigger header-toggle-chip__hint">?<span class="hint-tooltip">When enabled, the refinement agent is automatically triggered for backlog tasks that have not yet been refined.</span></span>
                </span>
                <span class="header-toggle-chip__switch">
                  <input type="checkbox" id="autorefine-toggle" onchange="toggleAutorefine()">
                  <span class="header-toggle-chip__track" aria-hidden="true"></span>
                </span>
              </label>

              <label class="header-toggle-chip" for="autopilot-toggle">
                <span class="header-toggle-chip__meta">
                  <span class="header-toggle-chip__label">Implement</span>
                  <span class="hint-trigger header-toggle-chip__hint">?<span class="hint-tooltip">When enabled, backlog tasks are automatically moved to In Progress when there is available capacity. Tasks created by the brainstorm agent are not auto-promoted.</span></span>
                </span>
                <span class="header-toggle-chip__switch">
                  <input type="checkbox" id="autopilot-toggle" onchange="toggleAutopilot()">
                  <span class="header-toggle-chip__track" aria-hidden="true"></span>
                </span>
              </label>

              <label class="header-toggle-chip" for="autosync-toggle">
                <span class="header-toggle-chip__meta">
                  <span class="header-toggle-chip__label">Tip-sync</span>
                  <span class="hint-trigger header-toggle-chip__hint">?<span class="hint-tooltip">When enabled, waiting tasks whose worktrees have fallen behind the default branch are automatically rebased. Conflicts are resolved by the conflict resolver agent; unresolvable conflicts are handed off to the main agent.</span></span>
                </span>
                <span class="header-toggle-chip__switch">
                  <input type="checkbox" id="autosync-toggle" onchange="toggleAutosync()">
                  <span class="header-toggle-chip__track" aria-hidden="true"></span>
                </span>
              </label>

              <label class="header-toggle-chip" for="autotest-toggle">
                <span class="header-toggle-chip__meta">
                  <span class="header-toggle-chip__label">Test</span>
                  <span class="hint-trigger header-toggle-chip__hint">?<span class="hint-tooltip">When enabled, the test agent is automatically triggered for waiting tasks that have not yet been tested and whose worktree is up to date with the default branch.</span></span>
                </span>
                <span class="header-toggle-chip__switch">
                  <input type="checkbox" id="autotest-toggle" onchange="toggleAutotest()">
                  <span class="header-toggle-chip__track" aria-hidden="true"></span>
                </span>
              </label>

              <label class="header-toggle-chip" for="autosubmit-toggle">
                <span class="header-toggle-chip__meta">
                  <span class="header-toggle-chip__label">Submit</span>
                  <span class="hint-trigger header-toggle-chip__hint">?<span class="hint-tooltip">When enabled, waiting tasks that have passed test verification, are up to date with the default branch, and have no worktree conflicts are automatically moved to done.</span></span>
                </span>
                <span class="header-toggle-chip__switch">
                  <input type="checkbox" id="autosubmit-toggle" onchange="toggleAutosubmit()">
                  <span class="header-toggle-chip__track" aria-hidden="true"></span>
                </span>
              </label>

              <label class="header-toggle-chip" for="autopush-toggle">
                <span class="header-toggle-chip__meta">
                  <span class="header-toggle-chip__label">Push</span>
                  <span class="hint-trigger header-toggle-chip__hint">?<span class="hint-tooltip">When enabled, completed tasks are automatically pushed to the remote repository after committing.</span></span>
                </span>
                <span class="header-toggle-chip__switch">
                  <input type="checkbox" id="autopush-toggle" onchange="toggleAutopush()">
                  <span class="header-toggle-chip__track" aria-hidden="true"></span>
                </span>
              </label>

              <label class="header-toggle-chip" for="dep-graph-toggle">
                <span class="header-toggle-chip__meta">
                  <span class="header-toggle-chip__label">Dep graph</span>
                </span>
                <span class="header-toggle-chip__switch">
                  <input type="checkbox" id="dep-graph-toggle" onchange="toggleDependencyGraph()">
                  <span class="header-toggle-chip__track" aria-hidden="true"></span>
                </span>
              </label>
            </div>
            <span id="ideation-next-run" class="app-header__next-run" style="display:none;"></span>
            <div id="watcher-health-section" class="watcher-health-section"></div>
          </div>
        </div>

        <button id="command-palette-btn" class="settings-btn command-palette-trigger-btn" onclick="openCommandPalette()" title="Open command palette">
          <span class="command-palette-trigger-kbd" aria-hidden="true">⌘K / Ctrl+K</span>
          <span class="command-palette-trigger-text">Command palette</span>
        </button>

        <button onclick="showSpanStats()" class="settings-btn" title="Execution Timing">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </button>
        <button onclick="openStatsModal()" class="settings-btn" title="Usage Analytics">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="18" y="3" width="4" height="18"></rect>
            <rect x="10" y="8" width="4" height="13"></rect>
            <rect x="2" y="13" width="4" height="8"></rect>
          </svg>
        </button>
        <button id="settings-btn" class="settings-btn" onclick="openSettings()" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<div id="command-palette" class="command-palette hidden">
  <div id="command-palette-panel" class="command-palette-panel">
    <div class="command-palette-header">
      <span class="command-palette-label">
        <strong>Command palette</strong>
      </span>
      <span id="command-palette-hint-keys" class="command-palette-hints">⌘/ Ctrl+K</span>
    </div>
    <input id="command-palette-input" type="text" placeholder="Search title, prompt, or task id" autocomplete="off" class="command-palette-input">
    <div id="command-palette-results" class="command-palette-results"></div>
  </div>
</div>

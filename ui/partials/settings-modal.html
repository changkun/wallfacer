<!-- Settings Modal -->
<div
  id="settings-modal"
  class="modal-overlay fixed inset-0 z-50 hidden items-center justify-center p-4"
>
  <div
    class="modal-card settings-modal-card"
    style="max-width: 840px; width: 100%"
  >
    <div class="p-6 settings-modal-content">
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 12px;
        "
      >
        <h3 style="font-size: 16px; font-weight: 600; margin: 0">Settings</h3>
        <button type="button"
          onclick="closeSettings()"
          style="
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-muted);
            line-height: 1;
          "
        >
          &times;
        </button>
      </div>

      <div class="settings-layout">
        <div
          class="settings-tab-list"
          role="tablist"
          aria-label="Settings tabs"
        >
          <button
            id="settings-tab-appearance"
            type="button"
            class="settings-tab active"
            role="tab"
            aria-selected="true"
            data-settings-tab="appearance"
          >
            Appearance
          </button>
          <button
            id="settings-tab-execution"
            type="button"
            class="settings-tab"
            role="tab"
            aria-selected="false"
            data-settings-tab="execution"
          >
            Execution
          </button>
          <button
            id="settings-tab-sandbox"
            type="button"
            class="settings-tab"
            role="tab"
            aria-selected="false"
            data-settings-tab="sandbox"
          >
            Sandbox
          </button>
          <button
            id="settings-tab-workspace"
            type="button"
            class="settings-tab"
            role="tab"
            aria-selected="false"
            data-settings-tab="workspace"
          >
            Workspace
          </button>
          <button
            id="settings-tab-prompts"
            type="button"
            class="settings-tab"
            role="tab"
            aria-selected="false"
            data-settings-tab="prompts"
          >
            Prompts
          </button>

          <button
            id="settings-tab-trash"
            type="button"
            class="settings-tab"
            role="tab"
            aria-selected="false"
            data-settings-tab="trash"
          >
            Trash
          </button>
          <button
            id="settings-tab-about"
            type="button"
            class="settings-tab"
            role="tab"
            aria-selected="false"
            data-settings-tab="about"
          >
            About
          </button>
        </div>

        <div class="settings-tab-content-wrap">
          {{template "settings-tab-appearance.html"}} {{template
          "settings-tab-execution.html"}} {{template
          "settings-tab-sandbox.html"}} {{template
          "settings-tab-workspace.html"}} {{template
          "settings-tab-prompts.html"}} {{template "settings-tab-trash.html"}}
          {{template "settings-tab-about.html"}}
        </div>
      </div>
    </div>
  </div>
</div>

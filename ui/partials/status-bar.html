<!-- Terminal panel (above status bar, pops up from its top edge) -->
<div
  id="status-bar-panel"
  class="status-bar-panel hidden"
  role="region"
  aria-label="Terminal panel"
>
  <div id="terminal-tab-bar" class="terminal-tab-bar" hidden>
    <div id="terminal-tab-list"></div>
    <button
      type="button"
      id="terminal-tab-add"
      class="terminal-tab-add"
      title="New session"
      aria-label="New terminal session"
      tabindex="-1"
    >
      +
    </button>
    <button
      type="button"
      id="terminal-container-btn"
      class="terminal-tab-add"
      title="Attach to container"
      aria-label="Attach to running container"
      tabindex="-1"
    >
      &#9634;
    </button>
  </div>
  <div id="terminal-canvas"></div>
</div>
<div
  id="status-bar-panel-resize"
  class="status-bar-panel-resize hidden"
  role="separator"
  aria-orientation="horizontal"
  aria-label="Resize terminal panel"
></div>
<!-- Status bar (hidden on mobile; mobile uses #mobile-col-nav) -->
<footer
  id="status-bar"
  class="status-bar"
  role="contentinfo"
  aria-label="Status bar"
>
  <div class="status-bar__left">
    <span
      id="status-bar-conn-dot"
      class="status-bar-conn-dot status-bar-conn-dot--closed"
      aria-label="Disconnected"
    ></span>
    <span id="status-bar-conn-label" class="status-bar-conn-label"
      >Connecting…</span
    >
    <span id="status-bar-workspace" class="status-bar-workspace"></span>
    <span
      id="status-bar-branches"
      class="status-bar-branches"
      aria-label="Workspace branches"
    ></span>
  </div>
  <div class="status-bar__center">
    <span class="status-bar-count" title="In Progress">
      <svg
        width="10"
        height="10"
        viewBox="0 0 10 10"
        fill="none"
        aria-hidden="true"
      >
        <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.5" />
        <polyline
          points="5,2.5 5,5 7,6.5"
          stroke="currentColor"
          stroke-width="1.2"
          stroke-linecap="round"
        />
      </svg>
      <span id="status-bar-in-progress">0</span>
    </span>
    <span class="status-bar-count" title="Waiting">
      <svg
        width="10"
        height="10"
        viewBox="0 0 10 10"
        fill="none"
        aria-hidden="true"
      >
        <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.5" />
        <line
          x1="5"
          y1="3"
          x2="5"
          y2="5.5"
          stroke="currentColor"
          stroke-width="1.2"
          stroke-linecap="round"
        />
        <circle cx="5" cy="7" r="0.6" fill="currentColor" />
      </svg>
      <span id="status-bar-waiting">0</span>
    </span>
  </div>
  <div class="status-bar__right">
    <!-- Latere.ai sign-in badge — only populated when config.cloud=true
         (see renderSigninBadge in status-bar.js). Empty in local mode. -->
    <div id="status-bar-signin" class="status-bar-signin"></div>
    <button
      type="button"
      id="status-bar-depgraph-btn"
      class="status-bar-btn"
      onclick="switchMode('depgraph', { persist: true })"
      title="Open map"
    >
      Map
    </button>
    <button
      type="button"
      id="status-bar-shortcuts-btn"
      class="status-bar-btn"
      onclick="openKeyboardShortcuts()"
      title="Keyboard shortcuts"
      aria-label="Show keyboard shortcuts"
    >
      Shortcuts <kbd class="status-bar-kbd">?</kbd>
    </button>
    <button
      type="button"
      id="status-bar-terminal-btn"
      class="status-bar-btn"
      onclick="toggleTerminalPanel()"
      title="Toggle terminal panel (Ctrl+&#96; to cycle)"
      aria-expanded="false"
      aria-controls="status-bar-panel"
    >
      Terminal <kbd class="status-bar-kbd">&#94;&#96;</kbd>
    </button>
  </div>
</footer>

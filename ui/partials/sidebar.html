        viewBox="0 0 16 16"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"

      >
        <rect x="0" y="0" width="6" height="3" fill="var(--accent)" />

        <rect x="0" y="4" width="4" height="3" fill="#8a3e21" />

        <rect x="12" y="4" width="4" height="3" fill="var(--accent-2)" />

        <rect x="0" y="12" width="3" height="4" fill="var(--accent)" />
        <rect x="4" y="12" width="6" height="4" fill="#8a3e21" />
        <rect x="11" y="12" width="5" height="4" fill="var(--accent)" />
      </svg>
    </span>
    <a
      href="https://github.com/changkun/wallfacer"
      target="_blank"
      rel="noopener noreferrer"
      class="sb-brand-name"
      onclick="event.stopPropagation()"
      >Wallfacer</a
    >
    <button
      type="button"
      class="sb-collapse"
      onclick="event.stopPropagation(); toggleSidebar();"
      title="Collapse sidebar"
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="3" x2="9" y2="21"></line>
      </svg>
    </button>

  <!-- Search -->
  <button
    type="button"
    class="sb-search"
    onclick="openCommandPalette()"
    title="Search (⌘K)"
  >
    <svg
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="20" y1="20" x2="16.65" y2="16.65"></line>
    </svg>
    <span>Search or command</span>
    <span class="kbd">⌘K</span>
  </button>

  <!-- Workspace section -->
  <div class="sb-section">Workspace</div>
  <div class="sb-nav">
    <button
      type="button"
      id="sidebar-nav-board"
      class="sb-nav-item active"
      onclick="switchMode('board', { persist: true })"
      title="Board"
    >
      <span class="sb-icon">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"

          stroke-linejoin="round"
        >
          <rect x="3" y="3" width="7" height="9" rx="1"></rect>
          <rect x="14" y="3" width="7" height="5" rx="1"></rect>

          <rect x="3" y="16" width="7" height="5" rx="1"></rect>

      <span>Board</span>
      <span

        class="sb-dot"
        hidden
        aria-hidden="true"
      ></span>
    </button>

    <button
      type="button"
      id="sidebar-nav-spec"
      class="sb-nav-item"
      onclick="switchMode('spec', { persist: true })"
      title="Plan"
    >
      <span class="sb-icon">
        <svg

          height="16"

          stroke-width="1.7"

      <span>Plan</span>
    </button>

    <button
      type="button"
      id="sidebar-nav-docs"
      class="sb-nav-item"
      onclick="switchMode('docs')"
      title="Docs"
    >
      <span class="sb-icon">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"

          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>

      <span>Docs</span>
    </button>

  <div class="sb-spacer"></div>

  <div class="sb-divider"></div>
  <div class="sb-nav">
    <button
      type="button"
      id="sidebar-settings-btn"

      title="Settings"
    >

        <svg
          width="16"

          fill="none"

<!-- Board -->
<div
  id="trash-bin-toast"
  class="trash-bin-toast hidden"
  role="status"
  aria-live="polite"
  aria-atomic="true"
></div>
<main class="board-grid flex-1 min-h-0" id="board" tabindex="-1">
  <!--
    Empty-Board composer slot — the BoardComposer module mounts the
    full prompt/advanced/submit UI here when the board is empty and
    unmounts once a task exists. Replaces the earlier one-line hint
    from the plan-to-board-bridges spec.
  -->
  <div id="board-empty-composer" class="board-empty-composer"></div>
  <div
    class="col col-backlog"
    id="col-wrapper-backlog"
    role="region"
    aria-label="Backlog column"
  >
    <div class="col-hd">
      <span class="col-dot" aria-hidden="true"></span>
      <span class="col-name">Backlog</span>
      <span id="count-backlog" class="col-count">0</span>
      <button
        id="backlog-sort-btn"
        type="button"
        class="col-btn"
        onclick="toggleBacklogSort()"
        title="Toggle backlog sorting between manual priority and idea impact score"
      >
        Sort: Manual
      </button>
    </div>
    <div class="column col-bg">
      <button
        type="button"
        id="new-task-btn"
        onclick="showNewTaskForm()"
        class="btn-dashed mb-2"
      >
        + New Task
      </button>
      <div
        id="new-task-form"
        class="composer hidden mb-2"
        data-task-flow="implement"
      >
        <!-- Header: flow picker + templates share a single compact row.
             The flow dropdown replaces the older Implement/Brainstorm
             Type picker; per-agent sandbox choice now lives on the flow
             definition itself (Flows tab) rather than in the composer. -->
        <div class="composer__head">
          <label class="composer__flow-label" for="new-task-flow">Flow</label>
          <select
            id="new-task-flow"
            class="composer__type"
            title="Flow determines which sub-agents run for this task. Built-ins: Implement (implement → test → commit), Brainstorm (workspace scan → up to three new task ideas). Edit or add flows in the Flows sidebar tab."
          >
            <option value="implement">Implement</option>
          </select>
          <button
            type="button"
            class="composer__templates"
            onclick="
              openTemplatesPicker(function (body) {
                var ta = document.getElementById('new-prompt');
                ta.value = body;
                ta.focus();
              })
            "
            title="Insert a saved prompt template"
          >
            Templates
          </button>
        </div>

        <textarea
          id="new-prompt"
          rows="4"
          placeholder="Describe the task… (Markdown supported, ⌘↵ to save)"
          data-prompt-placeholder-task="Describe the task… (Markdown supported, ⌘↵ to save)"
          data-prompt-placeholder-ideation="Optional: narrow the brainstorm focus… (leave empty to scan the whole workspace)"
          class="composer__prompt"
        ></textarea>

        <!-- Tags row: inline, no dedicated label row -->
        <div class="composer__tags" id="new-task-tag-input"></div>

        <!-- Primary execution row: timeout + share-code.
             The old Agent (Claude/Codex) dropdown retired now that
             harness choice lives on the agent definition each flow
             step references — clone an agent and set its Harness
             field in the Agents tab to pin Claude or Codex. The
             workspace-wide default is still controlled by
             WALLFACER_DEFAULT_SANDBOX. -->
        <div class="composer__row composer__row--wrap">
          <label class="composer__field">
            <span class="composer__field-label">Timeout</span>
            <select id="new-timeout" class="composer__input" title="Timeout">
              <option value="5">5 min</option>
              <option value="15">15 min</option>
              <option value="30">30 min</option>
              <option value="60" selected>1 hour</option>
              <option value="120">2 hours</option>
              <option value="360">6 hours</option>
              <option value="720">12 hours</option>
              <option value="1440">24 hours</option>
            </select>
          </label>
          <label
            class="composer__checkbox"
            data-host-hidden
            title="Mount other in-progress worktrees into this task's container as read-only paths. Not applicable in host execution mode, since there are no container mounts to share."
          >
            <input type="checkbox" id="new-mount-worktrees" />
            <span>Share siblings</span>
          </label>
        </div>

        <!-- Scheduling row: start time + repeat toggle on one line; interval reveals inline -->
        <div class="composer__row composer__row--wrap">
          <label class="composer__field composer__field--grow">
            <span class="composer__field-label">Start</span>
            <input
              type="datetime-local"
              id="new-scheduled-at"
              class="composer__input"
              title="Leave empty to run immediately"
            autocomplete="off"
            />
          </label>
          <label
            class="composer__checkbox"
            title="Create a routine that spawns a fresh task every interval instead of running once."
          >
            <input type="checkbox" id="new-repeat-toggle" />
            <span>Repeat every</span>
          </label>
          <label
            id="new-repeat-minutes-row"
            class="composer__field composer__field--compact"
            style="display: none"
          >
            <input
              type="number"
              id="new-repeat-minutes"
              class="composer__input composer__input--num"
              min="1"
              step="1"
              value="60"
              aria-label="Interval in minutes"
            autocomplete="off"
            />
            <span class="composer__field-label">min</span>
          </label>
        </div>

        <!-- Advanced disclosures: thin chevron rows, no card chrome -->
        <details class="composer__more">
          <summary class="composer__more-summary">
            <svg
              class="composer__chev"
              width="10"
              height="10"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
            Budget
          </summary>
          <div class="composer__row composer__row--wrap composer__nested">
            <label class="composer__field composer__field--grow">
              <span class="composer__field-label">Cost ($)</span>
              <input
                type="number"
                id="new-max-cost-usd"
                min="0"
                step="0.01"
                placeholder="0 = unlimited"
                class="composer__input"
            autocomplete="off"
              />
            </label>
            <label class="composer__field composer__field--grow">
              <span class="composer__field-label">Input tokens</span>
              <input
                type="number"
                id="new-max-input-tokens"
                min="0"
                step="1000"
                placeholder="0 = unlimited"
                class="composer__input"
            autocomplete="off"
              />
            </label>
          </div>
        </details>

        <!-- Depends On (only shown when other tasks exist) -->
        <details
          id="new-depends-on-row"
          class="composer__more"
          style="display: none"
        >
          <summary class="composer__more-summary">
            <svg
              class="composer__chev"
              width="10"
              height="10"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
            Depends on
          </summary>
          <div class="composer__nested">
            <div id="new-depends-on-picker" class="dep-picker">
              <button
                type="button"
                class="dep-picker-trigger"
                onclick="toggleDepPicker('new-depends-on-picker')"
              >
                <div class="dep-picker-chips">
                  <span class="dep-picker-placeholder">None</span>
                </div>
                <svg
                  class="dep-picker-chevron"
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div class="dep-picker-dropdown" style="display: none">
                <input
                  class="dep-picker-search"
                  type="text"
                  placeholder="Filter tasks…"
                  oninput="filterDepPicker(this)"
            autocomplete="off"
                />
                <div class="dep-picker-list"></div>
              </div>
            </div>
          </div>
        </details>

        <!-- Actions: right-aligned, primary + secondary -->
        <div class="composer__actions">
          <button
            type="button"
            onclick="hideNewTaskForm()"
            class="composer__btn composer__btn--ghost"
          >
            Cancel
          </button>
          <button
            type="button"
            onclick="createTask()"
            class="composer__btn composer__btn--primary"
          >
            Save
          </button>
        </div>
      </div>
      <button
        type="button"
        onclick="focusFirstCardInColumn('backlog')"
        style="
          position: absolute;
          width: 1px;
          height: 1px;
          overflow: hidden;
          clip: rect(0, 0, 0, 0);
          white-space: nowrap;
        "
      >
        Jump to Backlog column
      </button>
      <div
        id="col-backlog"
        class="space-y-2"
        data-status="backlog"
        role="list"
      ></div>
    </div>
  </div>
  <div
    class="col col-progress"
    id="col-wrapper-in_progress"
    role="region"
    aria-label="In Progress column"
  >
    <div class="col-hd">
      <span class="col-dot" aria-hidden="true"></span>
      <span class="col-name">In Progress</span>
      <span id="count-in_progress" class="col-count">0</span>
      <button
        type="button"
        id="max-parallel-tag"
        class="max-parallel-tag hidden"
        title="Max parallel tasks for this workspace group — click to edit"
        onclick="editMaxParallelForCurrentGroup(event)"
      ></button>
      <button
        type="button"
        class="col-icon-btn"
        onclick="showContainerMonitor(event)"
        title="Sandbox Monitor"
      >
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="4 17 10 11 4 5"></polyline>
          <line x1="12" y1="19" x2="20" y2="19"></line>
        </svg>
      </button>
    </div>
    <button
      type="button"
      onclick="focusFirstCardInColumn('in_progress')"
      style="
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      "
    >
      Jump to In Progress column
    </button>
    <div
      id="col-in_progress"
      class="column col-bg space-y-2"
      data-status="in_progress"
      role="list"
    ></div>
  </div>
  <div
    class="col col-waiting"
    id="col-wrapper-waiting"
    role="region"
    aria-label="Waiting column"
  >
    <div class="col-hd">
      <span class="col-dot" aria-hidden="true"></span>
      <span class="col-name">Waiting</span>
      <span id="count-waiting" class="col-count">0</span>
    </div>
    <button
      type="button"
      onclick="focusFirstCardInColumn('waiting')"
      style="
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      "
    >
      Jump to Waiting column
    </button>
    <div
      id="col-waiting"
      class="column col-bg space-y-2"
      data-status="waiting"
      role="list"
    ></div>
  </div>
  <div
    class="col col-done"
    id="col-wrapper-done"
    role="region"
    aria-label="Done column"
  >
    <div class="col-hd">
      <span class="col-dot" aria-hidden="true"></span>
      <span class="col-name">Done</span>
      <span id="count-done" class="col-count">0</span>
      <span id="done-stats" class="col-stats hidden"></span>
      <button
        type="button"
        id="archive-all-btn"
        class="col-btn hidden"
        onclick="archiveAllDone()"
        title="Archive all done tasks"
      >
        Archive all
      </button>
    </div>
    <button
      type="button"
      onclick="focusFirstCardInColumn('done')"
      style="
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      "
    >
      Jump to Done column
    </button>
    <div
      id="col-done"
      class="column col-bg space-y-2"
      data-status="done"
      role="list"
    ></div>
  </div>
</main>

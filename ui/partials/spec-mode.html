<div
  id="spec-mode-container"
  class="spec-mode-container"
  data-layout="three-pane"
  style="display: none"
>
  <div id="spec-focused-view" class="spec-focused-view">
    <div class="spec-focused-view__header">
      <div class="spec-focused-view__chrome">
        <span id="spec-focused-path" class="spec-focused-view__path"></span>
        <span id="spec-focused-status" class="spec-focused-view__status"></span>
        <span id="spec-focused-kind" class="spec-focused-view__kind"></span>
        <span id="spec-focused-effort" class="spec-focused-view__effort"></span>
        <span class="spec-focused-view__spacer"></span>
        <button
          type="button"
          id="spec-archive-btn"
          class="spec-summarize-btn hidden"
          onclick="archiveFocusedSpec()"
          title="Archive this spec (hide from live graph)"
        >
          Archive
        </button>
        <button
          type="button"
          id="spec-unarchive-btn"
          class="spec-summarize-btn hidden"
          onclick="unarchiveFocusedSpec()"
          title="Unarchive this spec (return to drafted)"
        >
          Unarchive
        </button>
        <button
          type="button"
          id="spec-summarize-btn"
          class="spec-summarize-btn hidden"
        >
          Summarize
        </button>
        <button
          id="spec-chat-toggle-btn"
          class="spec-chat-toggle-btn"
          type="button"
          onclick="toggleSpecChat()"
          title="Toggle chat pane (C)"
          aria-pressed="true"
        >
          Chat
        </button>
        <button
          type="button"
          id="spec-dispatch-btn"
          class="spec-dispatch-btn hidden"
        >
          Dispatch
        </button>
      </div>
      <span id="spec-focused-title" class="spec-focused-view__title"></span>
    </div>
    <div id="spec-focused-meta" class="spec-focused-view__meta"></div>
    <div
      id="spec-archived-banner"
      class="spec-archived-banner hidden"
      role="status"
    >
      <span class="spec-archived-banner__icon" aria-hidden="true"
        >&#x2298;</span
      >
      <span class="spec-archived-banner__text">
        Archived &mdash; read-only. Hidden from the live graph and drift checks.
      </span>
      <button
        type="button"
        id="spec-archived-banner-unarchive"
        class="spec-summarize-btn"
        onclick="unarchiveFocusedSpec()"
      >
        Unarchive
      </button>
    </div>
    <div id="spec-focused-body" class="spec-focused-view__body">
      <div
        id="spec-focused-body-inner"
        class="spec-focused-view__body-inner prose-content"
      ></div>
    </div>
    <div
      id="spec-archive-toasts"
      class="spec-archive-toasts"
      role="status"
      aria-live="polite"
    ></div>
  </div>
  <div
    id="spec-chat-resize"
    class="spec-chat-resize"
    role="separator"
    aria-orientation="horizontal"
  ></div>
  <div id="spec-chat-stream" class="spec-chat-stream">
    <div class="spec-chat-stream__header">
      <span class="spec-chat-stream__title">Planning Chat</span>
      <span class="spec-chat-stream__header-actions">
        <button
          type="button"
          id="spec-chat-clear"
          class="spec-chat-clear-btn"
          title="Clear conversation"
        >
          Clear
        </button>
        <button
          type="button"
          class="spec-chat-fold-btn"
          onclick="toggleSpecChat()"
          title="Hide chat (C)"
        >
          &#x2715;
        </button>
      </span>
    </div>
    <div
      id="spec-chat-tabs"
      class="spec-chat-tabs"
      role="tablist"
      aria-label="Planning chat threads"
    ></div>
    <div id="spec-chat-messages" class="spec-chat-stream__messages"></div>
    <div id="spec-chat-empty-hint" class="spec-chat-empty-hint">
      Try <span class="spec-chat-empty-hint__cmd">/create &lt;title&gt;</span>
      to save this thread as a spec
    </div>
    <div class="spec-chat-composer">
      <textarea
        id="spec-chat-input"
        class="spec-chat-composer__input"
        placeholder="Message..."
        rows="1"
      ></textarea>
      <div class="spec-chat-composer__bar">
        <div class="spec-chat-composer__actions">
          <button
            type="button"
            id="spec-chat-slash-hint"
            class="spec-chat-composer__action"
            title="Slash commands"
          >
            /
          </button>
          <button
            type="button"
            id="spec-chat-at-hint"
            class="spec-chat-composer__action"
            title="Mention a file"
          >
            @
          </button>
        </div>
        <div class="spec-chat-composer__right">
          <span
            id="spec-chat-send-hint"
            class="spec-chat-composer__hint"
          ></span>
          <div class="spec-chat-send-group">
            <button
              type="button"
              id="spec-chat-send"
              class="spec-chat-composer__send"
            >
              &#x27A4;
            </button>
            <button
              type="button"
              id="spec-chat-send-mode"
              class="spec-chat-composer__send-toggle"
              title="Toggle send shortcut"
            >
              &#x25BE;
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

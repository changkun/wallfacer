<!-- Alert Modal -->
<div
  id="alert-modal"
  class="modal-overlay fixed inset-0 z-[60] hidden items-center justify-center p-4"
>
  <div class="modal-card" style="max-width: 420px; width: 100%">
    <div class="p-6">
      <div class="flex items-start gap-3 mb-4">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="color: #e05252; flex-shrink: 0; margin-top: 1px"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <p
          id="alert-message"
          class="text-sm"
          style="color: var(--text-primary); margin: 0; line-height: 1.5"
        ></p>
      </div>
      <div style="display: flex; justify-content: flex-end">
        <button
          type="button"
          id="alert-ok-btn"
          onclick="closeAlert()"
          class="btn btn-accent"
        >
          OK
        </button>
      </div>
    </div>
  </div>
</div>

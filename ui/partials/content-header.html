<header class="app-header">
  <div id="workspace-group-tabs" class="workspace-group-tabs"></div>
  <div class="app-header__actions">
    <div class="task-search-wrapper app-header__search">
      <span class="task-search-icon">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input
        type="search"
        id="task-search"
        placeholder="Filter tasks… or @search server"
        autocomplete="off"
        class="task-search-input"
      />
      <button type="button"
        id="task-search-clear"
        class="task-search-clear"
        title="Clear search"
      >
        &times;
      </button>
    </div>

    <div class="app-header__button-row">
      <button type="button"
        id="explorer-toggle-btn"
        class="settings-btn"
        onclick="toggleExplorer()"
        title="Toggle Explorer (E)"
        aria-expanded="false"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
          ></path>
          <line x1="9" y1="9" x2="9" y2="21"></line>
        </svg>
      </button>

      {{template "automation-menu.html"}}

      <button type="button"
        onclick="showSpanStats()"
        class="settings-btn"
        title="Execution Timing"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </button>
      <button type="button"
        onclick="openStatsModal()"
        class="settings-btn"
        title="Usage Analytics"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="18" y="3" width="4" height="18"></rect>
          <rect x="10" y="8" width="4" height="13"></rect>
          <rect x="2" y="13" width="4" height="8"></rect>
        </svg>
      </button>
    </div>
  </div>
</header>
<div id="workspace-git-bar" class="workspace-git-bar"></div>

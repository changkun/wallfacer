<aside id="explorer-panel" class="explorer-panel" style="display: none">
  <div class="explorer-panel__header">
    <span class="explorer-panel__title">Explorer</span>
    <select
      id="spec-status-filter"
      class="spec-status-filter hidden"
      onchange="filterSpecTree(this.value)"
    >
      <option value="all">All</option>
      <option value="drafted">Drafted</option>
      <option value="validated">Validated</option>
      <option value="stale">Stale</option>
      <option value="complete">Complete</option>
      <option value="incomplete">Not complete</option>
    </select>
    <label
      id="spec-show-archived-wrap"
      class="spec-show-archived hidden"
      title="Show archived specs in the tree"
    >
      <input
        type="checkbox"
        id="spec-show-archived"
        onchange="toggleShowArchived(this.checked)"
      />
      Show archived
    </label>
  </div>
  <div id="explorer-tree" class="explorer-panel__tree">
    <!-- Tree nodes rendered by JS -->
  </div>
  <div id="spec-dispatch-bar" class="spec-dispatch-bar hidden">
    <button
      type="button"
      id="spec-dispatch-selected-btn"
      class="spec-dispatch-selected-btn hidden"
      onclick="dispatchSelectedSpecs()"
    >
      Dispatch Selected (0)
    </button>
  </div>
  <div class="explorer-panel__resize-handle" id="explorer-resize-handle"></div>
</aside>

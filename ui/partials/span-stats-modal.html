<!-- Span Stats Modal -->
<div id="span-stats-modal" class="modal-overlay fixed inset-0 z-50 hidden items-center justify-center p-4">
  <div class="modal-card" style="max-width: 820px; width: 100%; max-height: 85vh; display: flex; flex-direction: column;">
    <div class="p-6" style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
      <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px;">
        <div>
          <h3 style="font-size: 16px; font-weight: 600; margin: 0;">Execution Timing</h3>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 3px;">Per-phase latency aggregated across all tasks</div>
        </div>
        <button onclick="closeSpanStats()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted); line-height:1;">&times;</button>
      </div>

      <div style="flex: 1; min-height: 0; overflow-y: auto;">
        <!-- Loading state -->
        <div id="span-stats-loading" style="display: flex; align-items: center; justify-content: center; padding: 32px; color: var(--text-muted); font-size: 13px;">
          Loading…
        </div>
        <!-- Error state -->
        <div id="span-stats-error" class="hidden" style="padding: 12px; background: #f5d5d5; border-radius: 6px; font-size: 12px; color: #8c2020; font-family: monospace; white-space: pre-wrap;"></div>
        <!-- Empty state -->
        <div id="span-stats-empty" class="hidden" style="text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px;">
          No span data yet. Run a task to collect timing data.
        </div>
        <!-- Table -->
        <div id="span-stats-content" class="hidden">
          <div id="span-stats-summary" style="padding: 8px 0 12px; font-size: 12px; color: var(--text-muted);"></div>
          <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
              <thead>
                <tr style="border-bottom: 1px solid var(--border);">
                  <th style="text-align: left; padding: 6px 10px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;" title="Execution phase and what it measures">Phase</th>
                  <th style="text-align: right; padding: 6px 10px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;" title="Number of times this phase ran">Runs</th>
                  <th style="text-align: right; padding: 6px 10px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;" title="Fastest recorded duration">Min</th>
                  <th style="text-align: right; padding: 6px 10px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;" title="Median (p50): half of runs completed within this time. Bar shows proportion relative to the slowest phase.">Median</th>
                  <th style="text-align: right; padding: 6px 10px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;" title="95th percentile: 95% of runs completed within this time. Indicates tail latency.">95th %</th>
                  <th style="text-align: right; padding: 6px 10px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;" title="99th percentile: 99% of runs completed within this time. Highlights worst-case outliers.">99th %</th>
                  <th style="text-align: right; padding: 6px 10px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;" title="Slowest recorded duration">Max</th>
                </tr>
              </thead>
              <tbody id="span-stats-tbody"></tbody>
            </table>
          </div>
          <!-- Legend -->
          <div style="margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); display: flex; gap: 14px; flex-wrap: wrap; align-items: center;">
            <span><strong>Median</strong> = typical duration</span>
            <span><strong>95th/99th %</strong> = tail latency</span>
            <span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#22863a;"></span> &lt;5s</span>
            <span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#d97706;"></span> 5–30s</span>
            <span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#dc2626;"></span> &gt;30s</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
